<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <rect width="32" height="32" rx="6" fill="url(#robot-gradient)"/>
  <!-- head -->
  <rect x="6" y="8" width="20" height="14" rx="3" fill="white" opacity="0.95"/>
  <!-- eyes -->
  <circle cx="12" cy="14" r="2.5" fill="#4338ca"/>
  <circle cx="20" cy="14" r="2.5" fill="#4338ca"/>
  <!-- antenna -->
  <line x1="16" y1="8" x2="16" y2="4" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="16" cy="3" r="1.2" fill="white"/>
  <!-- mouth -->
  <rect x="11" y="19" width="10" height="2" rx="1" fill="#4338ca" opacity="0.8"/>
  <defs>
    <linearGradient id="robot-gradient" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6366f1"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
</svg>
